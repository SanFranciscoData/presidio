name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5.4.1
        with:
          version: "0.7.13"
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run pytest -q
